# 미사용. statefulSet을 사용함

apiVersion: apps/v1

kind: Deployment

metadata:
  name: kafka

spec:

  replicas: 1

  selector:
    matchLabels:
      app: kafka

  template:

    metadata:
      labels:
        app: kafka

    spec:
      containers:
        - name: kafka
          image: apache/kafka:4.1.1
          imagePullPolicy: Always

          envFrom:
            - configMapRef:
                name: kafka-configmap


