# =======================================================================
# ⚙️ GutJJeu RAG System 통합 환경 설정 파일 (Master Configuration)
# 이 파일 하나로 데이터베이스 접속, AI 모델, 임계값, 벡터DB 설정을 모두 통제합니다.
# =======================================================================

# ----------------------------------------------------
# 1. 데이터베이스 접속 설정 (MariaDB / MySQL)
# ----------------------------------------------------
database:
  url: "" # DB 서버 접속 주소 (IP 또는 도메인)
  username: "" # DB 접근 유저명
  password: "" # DB 접근 비밀번호
  name: "" # 사용할 데이터베이스(스키마) 명
  port: # DB 포트 번호 (기본: 3306)
  charset: "utf8mb4" # 이모지 등 다국어 지원을 위한 캐릭터셋 설정

  # RAG 시스템이 벡터화(Embedding)할 대상 테이블 목록입니다.
  # 컨트롤러는 이 테이블들의 Row 개수를 모두 합산하여 스케일링 레벨을 결정합니다.
  tables:
    - "Products"
    - "Product_Option"
    - "Products_Category"
    - "Orders_Item"
    - "Review"
    - "Customer_Service"
    - "Customer_Service_Detail"

# ----------------------------------------------------
# 2. AI 자연어 처리 모델 및 연산 장치 설정
# ----------------------------------------------------
model:
  # 한국어/다국어 성능이 뛰어난 BGE-M3 모델 사용 (1024 차원 벡터 생성)
  embedding: "BAAI/bge-m3"
  # 검색된 후보군의 텍스트 의미를 정밀하게 재평가(Re-scoring)하는 Cross-Encoder 모델
  reranker: "BAAI/bge-reranker-v2-m3"
  # 하드웨어 가속기 지정 (NVIDIA GPU가 있다면 "cuda", 없으면 "cpu")
  device: "cuda"

# ----------------------------------------------------
# 3. 로컬 파일 시스템 저장 경로 (L1 ~ L3 용도)
# ----------------------------------------------------
paths:
  index_root: "./data/indices" # FAISS 벡터 인덱스(.faiss) 및 캐시(.npy)가 저장될 루트 폴더
  meta_file: "./data/meta.jsonl" # 원본 텍스트 및 타겟팅 메타데이터가 담긴 JSONL 파일
  state_file: "./sync_state.json" # L4/L5 등 증분 동기화 시 마지막 업데이트 시간을 기록하는 상태 파일
  log_path: "./logs/rag_system.log" # 컨트롤러 레벨의 기본 시스템 로그 파일 경로

# ----------------------------------------------------
# 🔐 4. 보안 및 개인정보 복호화 설정
# ----------------------------------------------------
security:
  # MariaDB에 암호화되어 저장된 유저의 생년월일(Birth)을 복호화하기 위한 AES-256 키.
  # ⚠️ 중요: 백엔드(Java Spring)의 application.yml에 있는 aes.secret-key와 반드시 100% 동일해야 합니다.
  aes256_key: ""

# ----------------------------------------------------
# 📈 5. 오토 스케일링 임계값 (데이터 누적량 기준)
# ----------------------------------------------------
# controller.py가 매일 자정에 데이터를 카운트하여 아래 기준에 따라 엔진(L1~L5)을 자동 승급시킵니다.
thresholds:
  L1_limit: 10000 # 1만 건 미만 : FAISS Flat (정확도 100%, 전체 탐색)
  L2_limit: 100000 # 10만 건 미만: FAISS HNSW (계층형 그래프 탐색, 메모리/속도 최적화)
  L3_limit: 500000 # 50만 건 미만: FAISS IVF-PQ (벡터 압축 적용, VRAM 한계 극복)
  L4_limit: 1000000 # 100만 건 미만: Qdrant (Disk-based 연동, 상용 벡터 DB 도입)
  # 100만 건 이상을 초과하면 최고 등급인 L5_Milvus(분산 클러스터링)가 자동 가동됩니다.

# ----------------------------------------------------
# 🎯 6. 검색 및 스마트 부스팅 파라미터
# ----------------------------------------------------
search:
  top_k_retrieval: 10 # 1차 예선(Vector Search)에서 DB로부터 끌어올릴 후보 데이터의 배수
  top_k_final: 5 # 2차 결선(Reranking + 타겟 가중합)을 거쳐 최종적으로 클라이언트에게 반환할 개수

  # ⭐ [매우 중요] 엉뚱한 결과(예: 먹는 것 검색에 머그컵 노출)를 방지하는 컷오프 커트라인입니다.
  # 이전 버그를 수정하여 순수 모델 점수를 사용하므로, 값을 0.15 ~ 0.2 이상으로 상향 조정하는 것을 강력 권장합니다.
  score_threshold: 0.0003

# ----------------------------------------------------
# 🌐 7. 외부 상용 벡터 데이터베이스 접속 정보 (L4, L5 전용)
# ----------------------------------------------------
vector_db:
  qdrant: # L4 레벨 전용 설정
    host: "localhost"
    port: 6333
    collection: "gutjjeu_rag"
  milvus: # L5 레벨 전용 설정
    host: "localhost"
    port: 19530
    collection: "gutjjeu_enterprise"

# ----------------------------------------------------
# 🎛️ 8. FAISS 인덱스 세부 튜닝 파라미터 (전문가용)
# ----------------------------------------------------
index_params:
  hnsw_m: 32 # [L2 전용] HNSW 그래프 노드당 연결 엣지 수 (높을수록 정확하나 메모리/빌드 속도 저하)
  ivf_nprobe: 10 # [L3 전용] IVF 검색 시 인접 클러스터를 몇 개까지 뒤져볼 것인지 설정 (정확도 vs 속도 조절)
  pq_m: 8 # [L3 전용] Product Quantization 압축률. 1024차원을 8개로 쪼개어 압축 (메모리 절약)
