apiVersion: apps/v1
 
kind: Deployment

metadata:
  name: assistant-service
  labels:
    app: assistant-service

spec:

  selector:
    matchLabels:
      app: assistant-service

  replicas: 1

  template:
    
    metadata:
      labels:
        app: assistant-service

    spec:
      containers:
        - name: assistant-service
          image: lujol/assistant-service:v0.1
          # image tag에 버전을 명시하는것이 아닌, latest를 사용하면 필요한 옵션 
          # Always : pod가 시작될 때 항상 dokerhub에 진입해서 이미지 해시값을 획인한다고 함 
          # imagePullPolicy: Always

          
          env:
          - name: JDBC_URL  
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: JDBC_URL            
          
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: DB_USER 
            
          - name: DB_PASSWORD
            valueFrom: 
              secretKeyRef:
                name: db-secret
                key: DB_PASSWORD 

          - name: ZIPKIN_ENDPOINT
            valueFrom: 
              secretKeyRef:
                name: zipkin-secret
                key: ZIPKIN_ENDPOINT 

          - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
            valueFrom: 
              secretKeyRef:
                name: zipkin-secret
                key: ZIPKIN_ENDPOINT 

          - name: REDIS_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: REDIS_ENDPOINT 

          - name: REDIS_PORT
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: REDIS_PORT 

          - name: AI_KEY
            valueFrom:
              secretKeyRef:
                name: ai-secret
                key: AI_KEY 

          - name: AI_MODEL
            valueFrom:
              secretKeyRef:
                name: ai-secret
                key: AI_MODEL 

          - name: RAG_URL
            valueFrom:
              secretKeyRef:
                name: ai-secret
                key: RAG_URL      
                           
          ports:
            - containerPort: 8080






