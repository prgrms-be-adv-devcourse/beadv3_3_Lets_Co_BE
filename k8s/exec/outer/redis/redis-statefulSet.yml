apiVersion: apps/v1

kind: StatefulSet

metadata:
  name: redis

spec:

  replicas: 1

  selector:
    matchLabels:
      app: redis

  serviceName: "redis-service"

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: redis:latest
          
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          

          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: "local-path"
        resources:
          requests:
            storage: 3Gi


