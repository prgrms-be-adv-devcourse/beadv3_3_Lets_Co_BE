name: infra

services:
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"

  redis:
    image: redis:latest
    container_name: redis_boot
    ports:
      - "6379:6379"

  kafka-1:
    image: apache/kafka:4.1.1
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - CLUSTER_ID=ZWU1Y2JiNDctNDg3ZC
      - KAFKA_PROCESS_ROLES=controller, broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9091
      - KAFKA_LISTENERS=PLAINTEXT://:9090,CONTROLLER://:9091,EXTERNAL://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-1:9090,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT

    #   # JVM 힙 메모리: 컨테이너 제한(256m)보다 작게 설정해야 함 (약 70~80%)
    #   # 남은 공간은 JVM 자체 오버헤드와 OS 캐시로 사용됨
    #   - KAFKA_HEAP_OPTS=-Xmx200m -Xms200m
    # deploy:
    #   resources:
    #     limits:
    #       # Docker 컨테이너 최대 메모리 제한
    #       memory: 256m